name: iPGM Portfolio Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  repository_dispatch:
    types: [repo-updated]  # Triggered by program repos on push

jobs:
  sync:
    name: Sync Program Repos to iPGM Portfolio Board
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run iPGM portfolio sync
        env:
          ORG_PORTFOLIO_TOKEN: ${{ secrets.ORG_PORTFOLIO_TOKEN }}
          ORG_NAME: Chas-Test-Org
        run: node sync.js
